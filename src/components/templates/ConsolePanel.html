<style>
    :host { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .bar {
        display: flex; align-items: center; height: 26px;
        padding: 0 8px; gap: 6px;
        border-bottom: 1px solid var(--border, #3F3F46); flex-shrink: 0;
    }
    .label {
        font-size: 11px; font-weight: 600; color: var(--muted, #858585);
        text-transform: uppercase; letter-spacing: .5px; margin-right: 4px;
    }
    .btn {
        padding: 1px 10px; background: transparent;
        border: 1px solid var(--border, #3F3F46); border-radius: 2px;
        cursor: pointer; font-size: 11px;
        color: var(--text, #D4D4D4); font-family: inherit;
    }
    .btn:hover { background: rgba(255,255,255,.08); }
    .out {
        flex: 1; overflow-y: auto; padding: 3px 8px;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 12px; line-height: 1.65;
    }
    .line { white-space: pre-wrap; word-break: break-all; color: var(--text, #D4D4D4); }
    .line.info  { color: #9CDCFE; }
    .line.warn  { color: #DCDCAA; }
    .line.error { color: #F48771; }
</style>
<div class="bar">
    <button class="btn" id="btn-copy">Copy</button>
    <button class="btn" id="btn-clear">Clear</button>
</div>
<div class="out" id="out"></div>
