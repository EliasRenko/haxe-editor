<style>
    :host { display: contents; }

    .overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.65);
        display: flex; align-items: center; justify-content: center;
        z-index: 2000;
    }
    .overlay.hidden { display: none; }

    .window {
        background: var(--panel-bg, #252526);
        border: 1px solid var(--border, #3F3F46);
        border-radius: 4px;
        box-shadow: 0 8px 32px rgba(0,0,0,.7);
        display: flex; flex-direction: column;
        width: 760px; height: 500px;
        min-width: 400px; min-height: 280px;
        resize: both; overflow: hidden;
    }

    .header {
        height: 30px; background: var(--window-bg, #2D2D30);
        border-bottom: 1px solid var(--border, #3F3F46);
        display: flex; align-items: center;
        padding: 0 10px 0 12px; gap: 8px;
        border-radius: 4px 4px 0 0; flex-shrink: 0;
        cursor: default; user-select: none;
    }
    .title {
        flex: 1; font-size: 12px; font-weight: 600;
        color: var(--text, #D4D4D4);
        font-family: var(--font, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif);
    }
    .close-btn {
        width: 20px; height: 20px; background: transparent; border: none;
        cursor: pointer; color: var(--muted, #858585); font-size: 15px; line-height: 1;
        display: flex; align-items: center; justify-content: center;
        border-radius: 3px; font-family: inherit; padding: 0;
    }
    .close-btn:hover { background: #C0392B; color: #fff; }

    .body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
</style>

<div class="overlay hidden" id="overlay">
    <div class="window" id="window">
        <div class="header" id="header">
            <span class="title">Textures</span>
            <button class="close-btn" id="close-btn">&#x2715;</button>
        </div>
        <div class="body">
            <editor-texture-browser id="browser"></editor-texture-browser>
        </div>
    </div>
</div>
