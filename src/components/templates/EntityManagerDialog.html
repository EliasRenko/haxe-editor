<style>
    :host { display: contents; }

    /* ── Overlay / window ── */
    .overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.65);
        display: flex; align-items: center; justify-content: center;
        z-index: 2000;
    }
    .overlay.hidden { display: none; }
    .window {
        background: var(--panel-bg, #252526);
        border: 1px solid var(--border, #3F3F46);
        border-radius: 4px;
        box-shadow: 0 8px 32px rgba(0,0,0,.7);
        display: flex; flex-direction: column;
        width: 860px; height: 640px;
        min-width: 540px; min-height: 380px;
        resize: both; overflow: hidden;
    }
    .header {
        height: 30px; background: var(--window-bg, #2D2D30);
        border-bottom: 1px solid var(--border, #3F3F46);
        display: flex; align-items: center;
        padding: 0 10px 0 12px; gap: 8px;
        border-radius: 4px 4px 0 0; flex-shrink: 0;
        cursor: default; user-select: none;
    }
    .title {
        flex: 1; font-size: 12px; font-weight: 600;
        color: var(--text, #D4D4D4);
        font-family: var(--font, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif);
    }
    .close-btn {
        width: 20px; height: 20px; background: transparent; border: none;
        cursor: pointer; color: var(--muted, #858585); font-size: 15px; line-height: 1;
        display: flex; align-items: center; justify-content: center;
        border-radius: 3px; font-family: inherit; padding: 0;
    }
    .close-btn:hover { background: #C0392B; color: #fff; }

    /* ── Body layout ── */
    .body { flex: 1; min-height: 0; display: flex; }

    /* ── Left panel — entity list ── */
    .list-panel {
        width: 190px; flex-shrink: 0;
        border-right: 1px solid var(--border, #3F3F46);
        display: flex; flex-direction: column; min-height: 0;
    }
    .list-header {
        height: 22px; display: flex; align-items: center;
        padding: 0 8px; font-size: 11px; font-weight: 600;
        color: var(--muted, #858585); text-transform: uppercase; letter-spacing: .4px;
        border-bottom: 1px solid var(--border, #3F3F46); flex-shrink: 0;
        background: var(--window-bg, #2D2D30);
    }
    .list { flex: 1; overflow-y: auto; padding: 2px 0; }
    .list-item {
        display: flex; align-items: center; height: 22px;
        padding: 0 8px; cursor: default; user-select: none;
        font-size: 12px; color: var(--text, #D4D4D4);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .list-item:hover  { background: rgba(255,255,255,.05); }
    .list-item.selected { background: var(--accent, #0E639C); color: #fff; }
    .list-empty { padding: 10px 8px; font-size: 11px; color: var(--muted, #858585); font-style: italic; }
    .list-footer {
        display: flex; align-items: center; gap: 4px;
        padding: 5px 6px; border-top: 1px solid var(--border, #3F3F46);
        flex-shrink: 0;
    }
    .list-btn {
        flex: 1; height: 22px; background: var(--input-bg, #3C3C3C);
        border: 1px solid var(--border, #3F3F46); border-radius: 2px;
        cursor: pointer; font-size: 11px; color: var(--text, #D4D4D4);
        font-family: inherit; white-space: nowrap;
    }
    .list-btn:hover { background: rgba(255,255,255,.08); }
    .list-btn.danger:hover { background: #C0392B; color: #fff; border-color: #C0392B; }

    /* ── Right panel — form ── */
    .form-panel {
        flex: 1; display: flex; flex-direction: column; min-height: 0; min-width: 0;
    }
    .form-scroll {
        flex: 1; overflow-y: auto; padding: 10px 12px; min-height: 0;
    }

    /* ── Section headings ── */
    .section-head {
        font-size: 11px; font-weight: 700; color: var(--text, #D4D4D4);
        border-bottom: 1px solid var(--border, #3F3F46);
        padding-bottom: 3px; margin-bottom: 8px; margin-top: 14px;
    }
    .section-head:first-of-type { margin-top: 0; }

    /* ── Generic form row ── */
    .row {
        display: flex; align-items: center; gap: 6px;
        margin-bottom: 6px; font-size: 12px;
    }
    .row label { width: 80px; flex-shrink: 0; color: var(--muted, #858585); font-size: 11px; }
    .row input[type=text], .row input[type=number], .row select {
        background: var(--input-bg, #3C3C3C); color: var(--text, #D4D4D4);
        border: 1px solid var(--border, #3F3F46); border-radius: 2px;
        height: 22px; padding: 0 6px; font-size: 11px; outline: none;
        font-family: inherit;
    }
    .row input[type=text] { flex: 1; }
    .row input[type=number] { width: 66px; }
    .row select { flex: 1; }
    .row input:focus, .row select:focus { border-color: var(--accent, #0E639C); }
    .row input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; margin: 0; }
    .check-label { font-size: 11px; color: var(--text, #D4D4D4); cursor: pointer; }

    /* ── Appearance preview ── */
    .preview-wrap {
        position: relative; width: 180px; height: 180px;
        border: 1px solid var(--border, #3F3F46); border-radius: 2px;
        overflow: hidden; flex-shrink: 0; cursor: crosshair;
        background-image:
            linear-gradient(45deg,#383838 25%,transparent 25%),
            linear-gradient(-45deg,#383838 25%,transparent 25%),
            linear-gradient(45deg,transparent 75%,#383838 75%),
            linear-gradient(-45deg,transparent 75%,#383838 75%);
        background-size: 16px 16px;
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* ── Region / region info row ── */
    .region-row {
        display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .region-btn {
        height: 22px; padding: 0 10px; background: var(--input-bg, #3C3C3C);
        border: 1px solid var(--border, #3F3F46); border-radius: 2px;
        cursor: pointer; font-size: 11px; color: var(--text, #D4D4D4);
        font-family: inherit; flex-shrink: 0;
    }
    .region-btn:hover { background: rgba(255,255,255,.08); }
    .region-info { font-size: 11px; color: var(--muted, #858585); }

    /* ── Pivot grid ── */
    .pivot-grid {
        display: grid; grid-template-columns: repeat(3, 20px);
        grid-template-rows: repeat(3, 20px); gap: 2px;
        flex-shrink: 0;
    }
    .pivot-cell {
        width: 20px; height: 20px;
        background: var(--input-bg, #3C3C3C);
        border: 1px solid var(--border, #3F3F46);
        border-radius: 2px; cursor: pointer;
    }
    .pivot-cell:hover  { background: rgba(255,255,255,.12); }
    .pivot-cell.active { background: var(--accent, #0E639C); border-color: var(--accent, #0E639C); }

    /* ── Custom properties table ── */
    .props-table {
        width: 100%; border-collapse: collapse; font-size: 11px;
        margin-bottom: 6px;
    }
    .props-table thead tr { background: var(--window-bg, #2D2D30); }
    .props-table th {
        text-align: left; padding: 3px 6px; color: var(--muted, #858585);
        font-weight: 600; border-bottom: 1px solid var(--border, #3F3F46);
    }
    .props-table td { padding: 2px 4px; border-bottom: 1px solid var(--border, #3F3F46); }
    .props-table tr:hover td { background: rgba(255,255,255,.04); }
    .props-table input, .props-table select {
        width: 100%; background: transparent; border: none; outline: none;
        color: var(--text, #D4D4D4); font-size: 11px; font-family: inherit;
        padding: 1px 2px; height: 20px;
    }
    .props-table input:focus { background: var(--input-bg, #3C3C3C); border-radius: 2px; }
    .props-footer { display: flex; gap: 4px; margin-bottom: 4px; }
    .props-btn {
        height: 22px; padding: 0 10px;
        background: var(--input-bg, #3C3C3C);
        border: 1px solid var(--border, #3F3F46); border-radius: 2px;
        cursor: pointer; font-size: 11px; color: var(--text, #D4D4D4);
        font-family: inherit;
    }
    .props-btn:hover { background: rgba(255,255,255,.08); }
    .props-btn.danger:hover { background: #C0392B; color: #fff; border-color: #C0392B; }

    /* ── Form footer ── */
    .form-footer {
        display: flex; align-items: center; justify-content: flex-end;
        gap: 6px; padding: 8px 12px;
        border-top: 1px solid var(--border, #3F3F46); flex-shrink: 0;
    }
    .footer-btn {
        height: 24px; padding: 0 14px;
        background: var(--input-bg, #3C3C3C);
        border: 1px solid var(--border, #3F3F46); border-radius: 2px;
        cursor: pointer; font-size: 11px; color: var(--text, #D4D4D4);
        font-family: inherit;
    }
    .footer-btn:hover { background: rgba(255,255,255,.08); }
    .footer-btn.primary {
        background: var(--accent, #0E639C); border-color: var(--accent, #0E639C); color: #fff;
    }
    .footer-btn.primary:hover { background: var(--accent-hover, #1177BB); }

    /* scrollbar */
    .form-scroll::-webkit-scrollbar, .list::-webkit-scrollbar { width: 6px; }
    .form-scroll::-webkit-scrollbar-track, .list::-webkit-scrollbar-track { background: var(--panel-bg, #252526); }
    .form-scroll::-webkit-scrollbar-thumb, .list::-webkit-scrollbar-thumb { background: #4A4A4F; border-radius: 3px; }
</style>

<div class="overlay hidden" id="overlay">
    <div class="window" id="window">

        <!-- Title bar -->
        <div class="header" id="header">
            <span class="title">Entity Manager</span>
            <button class="close-btn" id="close-btn">&#x2715;</button>
        </div>

        <!-- Body -->
        <div class="body">

            <!-- Left: entity list -->
            <div class="list-panel">
                <div class="list-header">Entities</div>
                <div class="list" id="entity-list"></div>
                <div class="list-footer">
                    <button class="list-btn" id="btn-new">New</button>
                    <button class="list-btn danger" id="btn-delete">Delete</button>
                </div>
            </div>

            <!-- Right: form -->
            <div class="form-panel">
                <div class="form-scroll" id="form-scroll">

                    <!-- Basic -->
                    <div class="section-head">Basic</div>

                    <div class="row">
                        <label for="inp-name">Name</label>
                        <input type="text" id="inp-name" placeholder="entity name">
                    </div>

                    <!-- Appearance -->
                    <div class="section-head">Appearance</div>

                    <div class="row">
                        <label for="sel-tilemap">Tilemap</label>
                        <select id="sel-tilemap"></select>
                    </div>

                    <div class="row">
                        <label for="inp-width">Width</label>
                        <input type="number" id="inp-width" value="32" min="1">
                        <label for="inp-height" style="width:44px;">Height</label>
                        <input type="number" id="inp-height" value="32" min="1">
                    </div>

                    <div class="region-row">
                        <button class="region-btn" id="btn-region">Region...</button>
                        <span class="region-info" id="region-info">No region selected</span>
                    </div>

                    <!-- Preview canvas -->
                    <div class="preview-wrap" id="preview-wrap">
                        <canvas id="preview-canvas"></canvas>
                    </div>

                    <!-- Behaviour -->
                    <div class="section-head">Behaviour</div>

                    <div class="row">
                        <label>Pivot</label>
                        <div class="pivot-grid" id="pivot-grid">
                            <div class="pivot-cell" data-px="0"   data-py="0"></div>
                            <div class="pivot-cell" data-px="0.5" data-py="0"></div>
                            <div class="pivot-cell" data-px="1"   data-py="0"></div>
                            <div class="pivot-cell" data-px="0"   data-py="0.5"></div>
                            <div class="pivot-cell" data-px="0.5" data-py="0.5"></div>
                            <div class="pivot-cell" data-px="1"   data-py="0.5"></div>
                            <div class="pivot-cell" data-px="0"   data-py="1"></div>
                            <div class="pivot-cell" data-px="0.5" data-py="1"></div>
                            <div class="pivot-cell" data-px="1"   data-py="1"></div>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:3px;">
                            <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted,#858585);">
                                X&nbsp;<input type="number" id="inp-pivot-x" value="0" min="0" max="1" step="0.01" style="width:56px;">
                                Y&nbsp;<input type="number" id="inp-pivot-y" value="0" min="0" max="1" step="0.01" style="width:56px;">
                            </div>
                        </div>
                    </div>

                    <!-- Custom Properties -->
                    <div class="section-head">Custom Properties</div>
                    <table class="props-table">
                        <thead>
                            <tr>
                                <th style="width:40%">Name</th>
                                <th style="width:25%">Type</th>
                                <th>Default</th>
                            </tr>
                        </thead>
                        <tbody id="props-body"></tbody>
                    </table>
                    <div class="props-footer">
                        <button class="props-btn" id="btn-add-prop">+ Add</button>
                        <button class="props-btn danger" id="btn-remove-prop">Remove</button>
                    </div>

                </div><!-- /form-scroll -->

                <!-- Footer buttons -->
                <div class="form-footer">
                    <button class="footer-btn" id="btn-close-footer">Close</button>
                    <button class="footer-btn primary" id="btn-save">Save</button>
                </div>
            </div><!-- /form-panel -->

        </div><!-- /body -->
    </div><!-- /window -->
</div><!-- /overlay -->
